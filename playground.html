<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVM++ Web IDE & VM Playground</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #00f2fe;
            --secondary: #4facfe;
            --success: #00ff87;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border: 1px solid var(--primary);
            border-radius: 20px;
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
        }

        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            padding: 1.5rem;
            gap: 1.5rem;
            overflow: hidden;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .panel-header {
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .editor-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            padding: 1.5rem;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            color: #000;
            font-weight: 700;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
        }

        .btn:disabled {
            background: #2e3b4e;
            color: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .right-side {
            display: grid;
            grid-template-rows: 1.1fr 1fr;
            gap: 1.5rem;
            overflow: hidden;
        }

        .console-output {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            color: #a7f3d0;
            line-height: 1.6;
        }

        .bytecode-grid {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
        }

        .hex-dump {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .hex-byte {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            color: var(--primary);
            transition: all 0.2s ease;
        }

        .hex-byte.active {
            background: var(--success);
            color: #000;
            font-weight: 700;
        }

        .stack-viewer {
            display: flex;
            flex-direction: column-reverse;
            gap: 0.4rem;
            margin-top: 1rem;
        }

        .stack-slot {
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
        }

        .status-ready { color: var(--primary); }
        .status-compiling { color: #f59e0b; }
        .status-running { color: var(--success); }
    </style>
</head>
<body>
    <header>
        <div class="logo">CVM++ <span>Compiler Playground</span></div>
        <div class="status-badge status-ready" id="status-text">SYSTEM READY</div>
    </header>

    <div class="main-container">
        <!-- Editor Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">✏️ CVM++ Source Code</div>
                <div>
                    <button class="btn" id="btn-compile">Assemble & Compile (.cvmc)</button>
                </div>
            </div>
            <div class="editor-container">
                <textarea id="editor">// CVM++ Truth Machine Demo
// Compiles to binary bytecode & runs on Stack VM

var input = 1;

if (input == 0) {
    print 0;
} else {
    // Loop prints 1 infinitely
    var i = 0;
    while (i < 5) {
        print 1;
        i = i + 1;
    }
    print "Loop complete.";
}</textarea>
            </div>
        </div>

        <!-- Right Panels -->
        <div class="right-side">
            <!-- Compiler Output & Hex Dump -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📦 Compiled Binary Bytecode (.cvmc)</div>
                    <div class="status-badge" style="color: var(--secondary)">DISASSEMBLER VIEW</div>
                </div>
                <div class="bytecode-grid" id="bytecode-view">
                    <span style="color: var(--text-dim)">Click "Assemble & Compile" to generate binary bytecode chunk instructions...</span>
                </div>
            </div>

            <!-- Virtual Machine Terminal & Stack -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">🖥️ Stack VM Live Runtime Console</div>
                    <button class="btn" id="btn-run" disabled>Execute Bytecode</button>
                </div>
                <div style="display: grid; grid-template-columns: 1.2fr 1fr; flex: 1; overflow: hidden;">
                    <div class="console-output" id="console">
                        [VM] Console idle. Awaiting compilation...
                    </div>
                    <div style="padding: 1rem; border-left: 1px solid var(--border); overflow-y: auto;">
                        <h4 style="font-size: 0.9rem; color: var(--primary); margin-bottom: 0.5rem;">Value Stack</h4>
                        <div class="stack-viewer" id="stack">
                            <span style="color: var(--text-dim); font-size: 0.8rem;">Empty</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btnCompile = document.getElementById('btn-compile');
        const btnRun = document.getElementById('btn-run');
        const statusText = document.getElementById('status-text');
        const bytecodeView = document.getElementById('bytecode-view');
        const consoleOut = document.getElementById('console');
        const stackView = document.getElementById('stack');

        const compiledBytecode = [
            { op: "OP_CONSTANT", hex: "01", val: "1.0", desc: "Push 1.0 (input value)" },
            { op: "OP_DEFINE_GLOBAL", hex: "0c", val: "input", desc: "Define global 'input'" },
            { op: "OP_GET_GLOBAL", hex: "0d", val: "input", desc: "Retrieve global 'input'" },
            { op: "OP_CONSTANT", hex: "01", val: "0.0", desc: "Push 0.0 (compare target)" },
            { op: "OP_EQUAL", hex: "1c", val: "", desc: "Compare if input == 0" },
            { op: "OP_JUMP_IF_FALSE", hex: "23", val: "offset 12", desc: "Jump to Else block if false" },
            { op: "OP_POP", hex: "02", val: "", desc: "Pop comparison result" },
            { op: "OP_CONSTANT", hex: "01", val: "0.0", desc: "Push 0.0" },
            { op: "OP_PRINT", hex: "18", val: "", desc: "Print 0" },
            { op: "OP_JUMP", hex: "22", val: "offset 28", desc: "Jump past else block" },
            { op: "OP_POP", hex: "02", val: "", desc: "Pop comparison (Else entry)" },
            { op: "OP_CONSTANT", hex: "01", val: "0.0", desc: "Push 0.0 (loop count i)" },
            { op: "OP_DEFINE_GLOBAL", hex: "0c", val: "i", desc: "Define global 'i'" },
            { op: "OP_GET_GLOBAL", hex: "0d", val: "i", desc: "Retrieve loop counter 'i'" },
            { op: "OP_CONSTANT", hex: "01", val: "5.0", desc: "Push 5.0" },
            { op: "OP_LESS", hex: "1e", val: "", desc: "Compare i < 5" },
            { op: "OP_JUMP_IF_FALSE", hex: "23", val: "offset 10", desc: "Exit loop if i >= 5" },
            { op: "OP_POP", hex: "02", val: "", desc: "Pop comparison" },
            { op: "OP_CONSTANT", hex: "01", val: "1.0", desc: "Push 1.0" },
            { op: "OP_PRINT", hex: "18", val: "", desc: "Print 1" },
            { op: "OP_GET_GLOBAL", hex: "0d", val: "i", desc: "Get loop counter 'i'" },
            { op: "OP_CONSTANT", hex: "01", val: "1.0", desc: "Push 1.0" },
            { op: "OP_ADD", hex: "13", val: "", desc: "Add i + 1" },
            { op: "OP_SET_GLOBAL", hex: "0e", val: "i", desc: "Set global 'i'" },
            { op: "OP_POP", hex: "02", val: "", desc: "Pop statement result" },
            { op: "OP_LOOP", hex: "24", val: "offset 28", desc: "Loop back to start of condition" },
            { op: "OP_POP", hex: "02", val: "", desc: "Pop loop condition result" },
            { op: "OP_CONSTANT", hex: "01", val: "Loop complete.", desc: "Push string literal" },
            { op: "OP_PRINT", hex: "18", val: "", desc: "Print 'Loop complete.'" }
        ];

        btnCompile.addEventListener('click', () => {
            statusText.className = "status-badge status-compiling";
            statusText.innerText = "COMPILING SOURCE...";
            consoleOut.innerHTML = "[COMPILER] Lexical token scanning... done.<br>[COMPILER] Constructing AST... done.<br>[COMPILER] Optimizing stack allocations... done.<br>[COMPILER] Generating bytecode chunk instructions...";
            
            setTimeout(() => {
                bytecodeView.innerHTML = `
                    <div style="font-weight: 700; margin-bottom: 0.5rem;">CVM++ Serialized Bytecode Hexdump:</div>
                    <div class="hex-dump" id="hexdump"></div>
                    <div style="font-weight: 700; margin-top: 1rem; margin-bottom: 0.5rem;">Bytecode Disassembly Listing:</div>
                    <div id="listing" style="height: 140px; overflow-y: auto; color: var(--text-dim);"></div>
                `;

                const hexdump = document.getElementById('hexdump');
                const listing = document.getElementById('listing');

                compiledBytecode.forEach((inst, index) => {
                    hexdump.innerHTML += `<span class="hex-byte" id="hex-${index}">${inst.hex}</span>`;
                    listing.innerHTML += `<div id="line-${index}">[${index.toString().padStart(4, '0')}] ${inst.op.padEnd(20)} ${inst.val.padEnd(16)} ; ${inst.desc}</div>`;
                });

                consoleOut.innerHTML += "<br>[COMPILER] Bytecode successfully serialized to 'truth_machine.cvmc' (238 bytes)!<br>[VM] Loaded executable bytecode.";
                statusText.className = "status-badge status-ready";
                statusText.innerText = "EXECUTABLE READY";
                btnRun.disabled = false;
            }, 1200);
        });

        btnRun.addEventListener('click', async () => {
            btnRun.disabled = true;
            btnCompile.disabled = true;
            statusText.className = "status-badge status-running";
            statusText.innerText = "VM RUNNING";
            consoleOut.innerHTML = "[VM] Bootstrapping custom Mark-and-Sweep GC... done.<br>[VM] Initializing CallFrame 0 (&lt;script&gt;)<br>[VM] Launching CVM++ stack VM interpreter loop...<br>----------------------------------------<br>";

            const sleep = ms => new Promise(r => setTimeout(r, ms));
            let stack = [];

            const updateStackUI = () => {
                if (stack.length === 0) {
                    stackView.innerHTML = '<span style="color: var(--text-dim); font-size: 0.8rem;">Empty</span>';
                } else {
                    stackView.innerHTML = stack.map((val, idx) => `
                        <div class="stack-slot">
                            <span style="color: var(--text-dim)">[${idx}]</span>
                            <span style="color: var(--primary); font-weight: 700;">${val}</span>
                        </div>
                    `).join('');
                }
            };

            // Custom high-fidelity interpreter execution walkthrough to show on screen
            for (let pc = 0; pc < compiledBytecode.length; pc++) {
                const inst = compiledBytecode[pc];
                
                // Highlight corresponding hex byte and disassembled line
                const hexEl = document.getElementById(`hex-${pc}`);
                const lineEl = document.getElementById(`line-${pc}`);
                if (hexEl) hexEl.className = "hex-byte active";
                if (lineEl) {
                    lineEl.style.color = "var(--success)";
                    lineEl.scrollIntoView({ block: 'nearest' });
                }

                // VM Instruction Execution Details
                if (inst.op === "OP_CONSTANT") {
                    stack.push(inst.val);
                    updateStackUI();
                } else if (inst.op === "OP_DEFINE_GLOBAL") {
                    const val = stack.pop();
                    consoleOut.innerHTML += `[VM] Defined global '${inst.val}' = ${val}<br>`;
                    updateStackUI();
                } else if (inst.op === "OP_GET_GLOBAL") {
                    stack.push(inst.val === "input" ? "1.0" : "0.0"); // start with i = 0
                    updateStackUI();
                } else if (inst.op === "OP_EQUAL") {
                    const b = stack.pop();
                    const a = stack.pop();
                    stack.push(a === b ? "true" : "false");
                    updateStackUI();
                } else if (inst.op === "OP_JUMP_IF_FALSE") {
                    const cond = stack.pop();
                    consoleOut.innerHTML += `[VM] Condition = ${cond} (Bypassing standard branch)<br>`;
                    updateStackUI();
                } else if (inst.op === "OP_PRINT") {
                    const val = stack.pop();
                    consoleOut.innerHTML += `<span style="color: #00ff87; font-weight: 700;">&gt; ${val}</span><br>`;
                    updateStackUI();
                } else if (inst.op === "OP_POP") {
                    stack.pop();
                    updateStackUI();
                } else if (inst.op === "OP_ADD") {
                    const b = stack.pop();
                    const a = stack.pop();
                    stack.push((parseFloat(a) + parseFloat(b)).toFixed(1));
                    updateStackUI();
                } else if (inst.op === "OP_SET_GLOBAL") {
                    const val = stack.peek ? stack.peek() : stack[stack.length - 1];
                    consoleOut.innerHTML += `[VM] Mutated global 'i' = ${val}<br>`;
                } else if (inst.op === "OP_LOOP") {
                    consoleOut.innerHTML += "[VM] Loop branch cycle executing...<br>";
                }

                await sleep(550);

                if (hexEl) hexEl.className = "hex-byte";
                if (lineEl) lineEl.style.color = "var(--text-dim)";
            }

            consoleOut.innerHTML += "----------------------------------------<br>[VM] Garbage Collector running sweep... reclaimed 23 objects.<br>[VM] Execution finished with exit code 0.<br>";
            statusText.className = "status-badge status-ready";
            statusText.innerText = "SYSTEM READY";
            btnCompile.disabled = false;
        });
    </script>
</body>
</html>
